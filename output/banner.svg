<svg width="850" height="250" viewBox="0 0 850 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fade-in { animation: fadeIn 2s ease-in-out forwards; }
    .typing { 
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #fbbf24;
      width: 0;
      animation: typing 3.5s steps(45, end) forwards, blink 0.75s step-end infinite;
      animation-delay: 1s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink { from, to { border-color: transparent; } 50% { border-color: #fbbf24; } }
    
    .profile-circle { animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>

  <rect width="850" height="250" rx="15" fill="#0d1117"/>
  
  <g class="profile-circle">
    <defs>
      <clipPath id="circleView">
        <circle cx="150" cy="125" r="70" />
      </clipPath>
    </defs>
    <image clip-path="url(#circleView)" x="80" y="55" width="140" height="140" href="https://raw.githubusercontent.com/Jo-Plus/Jo-Plus/main/output/Me.png" />
    <circle cx="150" cy="125" r="72" stroke="#fbbf24" stroke-width="2.5"/>
  </g>

  <g class="fade-in" style="font-family: 'Segoe UI', Tahoma, sans-serif;">
    <text x="280" y="100" fill="#fbbf24" font-size="28" font-weight="bold">Youssef Saeed</text>
    <foreignObject x="280" y="115" width="550" height="50">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color: #ffffff; font-size: 18px; font-weight: 500;">
        <div class="typing">Full Stack Developer | React, Next.js &amp; Node.js</div>
      </div>
    </foreignObject>
    <text x="280" y="185" fill="#8b949e" font-size="14">📧 saeedyoussef219@gmail.com</text>
    <text x="510" y="185" fill="#8b949e" font-size="14">📱 +20 101 028 3262</text>
  </g>
</svg>
